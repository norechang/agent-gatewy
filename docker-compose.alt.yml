version: '3.8'

# Alternative docker-compose that uses environment variables for credentials
# instead of mounting host config directory
#
# Usage:
#   1. Copy .env.example to .env
#   2. Add your LLM provider API keys to .env
#   3. Run: docker compose -f docker-compose.alt.yml up -d

services:
  opencode-server:
    image: node:20-slim
    container_name: opencode-server
    volumes:
      # Only mount agent definitions from this project
      - ./.opencode:/app/.opencode:ro
    working_dir: /app
    environment:
      # LLM Provider API Keys (set these in .env file)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    command: >
      bash -c "
        apt-get update && apt-get install -y curl procps &&
        curl -fsSL https://opencode.ai/install | bash &&
        source /root/.bashrc &&
        cd /app/.opencode &&
        if [ -f package.json ]; then npm ci --omit=dev; fi &&
        cd /app &&
        opencode serve --port 4096 --hostname 0.0.0.0
      "
    ports:
      - "4096:4096"
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4096/health || curl -f http://localhost:4096/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencode-gateway
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - OPENCODE_SERVER_URL=http://opencode-server:4096
      - NODE_ENV=production
    depends_on:
      opencode-server:
        condition: service_healthy
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  gateway-network:
    driver: bridge
